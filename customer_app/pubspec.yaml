name: stiltime_customer
description: StilTime - Mijoz ilovasi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Network
  dio: ^5.7.0
  retrofit: ^4.3.0
  pretty_dio_logger: ^1.3.1

  # Auth & Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI Components
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0
  flutter_rating_bar: ^4.0.1
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1

  # Maps
  url_launcher: ^6.3.0
  yandex_mapkit: ^4.2.0

  # Media
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Utils
  intl: ^0.20.2
  permission_handler: ^11.3.1
  flutter_phone_direct_caller: ^2.1.1
  share_plus: ^10.0.3
  qr_flutter: ^4.1.0
  geolocator: ^14.0.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  retrofit_generator: ^9.1.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

