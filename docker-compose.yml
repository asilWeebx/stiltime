version: '3.9'

services:
  # ─── Django Backend ───────────────────────────────────────
  backend:
    build: ./backend
    command: gunicorn stiltime.wsgi:application --bind 0.0.0.0:8000 --workers 4 --reload
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - '8000:8000'
    env_file: ./backend/.env
    depends_on:
      - redis
    networks: [stiltime]

  # ─── Celery Worker ────────────────────────────────────────
  celery:
    build: ./backend
    command: celery -A stiltime worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file: ./backend/.env
    depends_on: [backend, redis]
    networks: [stiltime]

  # ─── Celery Beat ──────────────────────────────────────────
  celery-beat:
    build: ./backend
    command: celery -A stiltime beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file: ./backend/.env
    depends_on: [backend, redis]
    networks: [stiltime]

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks: [stiltime]

  # ─── Admin Panel (React) ──────────────────────────────────
  admin:
    build:
      context: ./admin_panel
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    networks: [stiltime]

  # ─── Telegram Bot ─────────────────────────────────────────
  telegram-bot:
    build: ./telegram_bot
    command: python bot.py
    volumes:
      - ./telegram_bot:/app
    env_file: ./backend/.env
    environment:
      - API_BASE_URL=http://backend:8000/api/v1
    depends_on: [backend]
    networks: [stiltime]

  # ─── Nginx ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_files:/var/www/media
    depends_on: [backend, admin]
    networks: [stiltime]

volumes:
  redis_data:
  media_files:

networks:
  stiltime:
    driver: bridge
